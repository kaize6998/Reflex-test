<!DOCTYPE html>
<html>
<head>
  <title></title>
  <style>
    body { 
      text-align: center; 
      font-family: Arial; 
    }

    #bar {
      width: 300px;
      height: 20px;
      background: #ddd;
      margin: 100px auto;
      position: relative;
    }

    #target {
      width: 60px;
      height: 100%;
      background: black;
      position: absolute;
      left: 120px;
    }

    #player {
      width: 10px;
      height: 100%;
      background: red;
      position: absolute;
      left: 0;
    }

    #score {
      font-size: 20px;
      margin-top: 10px;
    }

    #level {
      font-size: 22px;
      margin-top: 5px;
      color: black;
    }

    button {
      padding: 5px 15px;
      font-size: 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>
<div id="score">Score: 0</div>
<p>Tap when red hits black!</p>


<div id="level">Level: Genesis</div>

<div id="bar">
  <div id="target"></div>
  <div id="player"></div>
</div>

<button onclick="tap()">TAP</button>

<script>
let pos = 0;
let speed = 1;
let direction = 1;
let score = 0;

const maxPos = 290;

// LEVEL SYSTEM
// REPLACE updateLevel() with this
function updateLevel() {
  let levelName = "Genesis";

  if (score >= 10) levelName = "Void";
  else if (score >= 9) levelName = "Final Limit";
  else if (score >= 7) levelName = "Redline";
  else if (score >= 5) levelName = "Dominion";
  else if (score >= 3) levelName = "Ascent";

  document.getElementById("level").innerText = "Level: " + levelName;
}
// MOVEMENT
function move() {
  let currentSpeed = speed;

  if (score === 0) {
    currentSpeed = 5;
  } else if (score === 1) {
    currentSpeed = 8;
  } else if (score === 2) {
    currentSpeed = 14;
  } else if (score === 3) {
    currentSpeed = 18;

    if (Math.random() < 0.08) {
      currentSpeed = 0;
    }

    if (Math.random() < 0.05) {
      pos += Math.random() * 8 - 4;
    }

  } else if (score === 4) {
    currentSpeed = 25;

    if (Math.random() < 0.10) {
      currentSpeed = 28;
    }

    if (Math.random() < 0.08) {
      pos += Math.random() * 12 - 6;
    }

  } else if (score === 5) {
    currentSpeed = 32;
  } else if (score === 6) {
    currentSpeed = 37;
  } else if (score === 7) {
    currentSpeed = 40;

    if (Math.random() < 0.08) {
      direction *= -1;
    }

  } else if (score === 8) {
    currentSpeed = 45;

    if (Math.random() < 0.12) {
      direction *= -1;
    }

    if (Math.random() < 0.08) {
      pos += Math.random() * 30 - 15;
    }

  } else {
    currentSpeed = 50;

    if (Math.random() < 0.2) {
      direction *= -1;
    }

    if (Math.random() < 0.15) {
      pos = Math.random() * maxPos;
    }
  }

  pos += currentSpeed * direction;

  if (pos > maxPos) {
    pos = maxPos;
    direction = -1;
  } else if (pos < 0) {
    pos = 0;
    direction = 1;
  }

  document.getElementById("player").style.left = pos + "px";
}

function gameLoop() {
  move();
  requestAnimationFrame(gameLoop);
}

gameLoop();

// TAP
function tap() {
  let targetStart = 120;
  let targetEnd = 180;

  if (pos >= targetStart && pos <= targetEnd) {
    score++;
    document.getElementById("score").innerText = "Score: " + score;
    updateLevel();
    speed += 0.5;
  } else {
    alert("Miss! 😭 Final Score: " + score);
    reset();
  }
}

// RESET
function reset() {
  pos = 0;
  speed = 1;
  score = 0;
  direction = 1;
  document.getElementById("score").innerText = "Score: 0";
  updateLevel();
}

// INIT
updateLevel();
</script>

</body>
</html>
